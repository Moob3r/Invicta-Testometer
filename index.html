<style>

  .month-header{font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin:20px 0 10px 56px;border-bottom:1px solid var(--gold-light);padding-bottom:5px}
  .timeline-row{display:flex;gap:14px;margin-bottom:10px}

  .date-dow{font-size:10px;color:#999;text-transform:uppercase}
  .timeline-line{width:3px;background:var(--gold);border-radius:2px;flex-shrink:0}

  .card{flex:1;background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px}
  .card-course{font-size:10px;font-weight:bold;letter-spacing:1px;color:var(--gold);text-transform:uppercase}
  .card-title{font-size:15px;font-weight:bold;color:var(--navy);margin-top:2px}
  .card-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .badge{font-size:10px;padding:3px 10px;border-radius:12px;font-weight:bold}
  .badge-test{background:#E8EEF7;color:#1B2A4A}
  .badge-practical{background:#FEF3E2;color:#92600A}
  .badge-quiz{background:#EBF5EB;color:#1A5C1A}
  .badge-exam{background:#F7E8E8;color:#8B1A1A}
  .badge-done{background:#f0f0f0;color:#999}
  .badge-soon{color:#C0392B;font-weight:bold;font-size:10px;background:#FEE;padding:3px 8px;border-radius:10px}
  .badge-away{color:#999;font-size:10px;padding:3px 8px}
  .card-meta{margin-top:7px;display:flex;gap:14px;font-size:11px;color:#777}
  .card-left-border-test{border-left:4px solid #1B2A4A}
  .card-left-border-practical{border-left:4px solid #C9A84C}
  .card-left-border-quiz{border-left:4px solid #2E8B2E}
  .card-left-border-exam{border-left:4px solid #C0392B}
  .cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .cal-nav-btn{background:none;border:1px solid var(--gold);color:var(--navy);padding:6px 16px;border-radius:4px;cursor:pointer;font-size:18px}
  .cal-month-title{font-size:18px;font-weight:bold;color:var(--navy);letter-spacing:1px}
  .cal-grid-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
  .cal-dow{text-align:center;font-size:10px;font-weight:bold;color:var(--gold);letter-spacing:1px;text-transform:uppercase;padding:5px 0}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-cell{min-height:72px;background:#fff;border:1px solid #e8e8e8;border-radius:5px;padding:5px}
  .cal-cell.empty{background:transparent;border:none}
  .cal-cell.today{box-shadow:0 0 0 2px var(--gold)}
  .cal-cell.break-day{background:#FEF9EE}
  .cal-cell.holiday-day{background:#f5f5f5}
  .cal-date{font-size:11px;color:#888;margin-bottom:3px}
  .cal-date.today-num{color:var(--gold);font-weight:bold}
  .cal-chip{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-left:3px solid transparent;cursor:default}
  .cal-chip-test{background:#E8EEF7;color:#1B2A4A;border-left-color:#1B2A4A}
  .cal-chip-practical{background:#FEF3E2;color:#92600A;border-left-color:#C9A84C}
  .cal-chip-quiz{background:#EBF5EB;color:#1A5C1A;border-left-color:#2E8B2E}
  .cal-chip-exam{background:#F7E8E8;color:#8B1A1A;border-left-color:#C0392B}
  .cal-chip-holiday{background:#f0f0f0;color:#888;border-left-color:#ccc;font-style:italic}
  .cal-chip-break{background:#FEF3E2;color:#92600A;border-left-color:#f0c060}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
  .legend-dot{width:10px;height:10px;border-radius:50%}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
  .modal{background:#fff;border-radius:10px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
  .modal-header{background:var(--navy);padding:16px 20px;border-radius:10px 10px 0 0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1}
  .modal-header-text .eyebrow{color:var(--gold);font-size:10px;letter-spacing:2px;text-transform:uppercase}
  .modal-header-text .title{color:#fff;font-size:17px;font-weight:bold}
  .modal-close{background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;line-height:1}
  .modal-body{padding:20px}
  .lock-screen{text-align:center;padding:30px 0}
  .lock-icon{font-size:36px;margin-bottom:10px}
  .lock-title{font-weight:bold;color:var(--navy);margin-bottom:5px}
  .lock-sub{color:#888;font-size:13px;margin-bottom:20px}
  .pw-input{padding:10px 14px;border:2px solid #ddd;border-radius:6px;font-size:14px;font-family:Georgia,serif;width:100%;max-width:280px;outline:none;margin-bottom:8px}
  .pw-input.error{border-color:#C0392B}
  .pw-error{color:#C0392B;font-size:12px;margin-bottom:8px}
  .unlock-btn{background:var(--navy);color:var(--gold);border:none;padding:10px 28px;border-radius:6px;cursor:pointer;font-size:14px;font-family:Georgia,serif;font-weight:bold;margin-top:6px}
  .success-bar{background:#EBF5EB;color:#1A5C1A;padding:10px 14px;border-radius:6px;margin-bottom:14px;font-size:13px;font-weight:bold}
  .form-box{background:var(--gold-light);border:1px solid var(--gold);border-radius:8px;padding:16px;margin-bottom:20px}
  .form-title{font-weight:bold;color:var(--navy);margin-bottom:12px;font-size:14px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .form-field{display:flex;flex-direction:column;gap:4px}
  .form-field.full{grid-column:1/-1}
  .form-label{font-size:11px;font-weight:bold;color:var(--navy);letter-spacing:0.5px}
  .form-input{padding:8px 10px;border:1px solid #ccc;border-radius:5px;font-size:13px;font-family:Georgia,serif;outline:none}
  .form-actions{display:flex;gap:8px;margin-top:12px}
  .save-btn{background:var(--navy);color:var(--gold);border:none;padding:9px 22px;border-radius:6px;cursor:pointer;font-size:13px;font-family:Georgia,serif;font-weight:bold}
  .cancel-btn{background:#fff;color:#888;border:1px solid #ccc;padding:9px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-family:Georgia,serif}
  .list-title{font-weight:bold;color:var(--navy);margin-bottom:10px;font-size:14px}
  .list-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid #eee;border-radius:6px;margin-bottom:6px;background:#fff}
  .list-item.editing{background:var(--gold-light)}
  .list-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .list-info{flex:1;min-width:0}
  .list-course{font-size:13px;font-weight:bold;color:var(--navy)}
  .list-meta{font-size:11px;color:#888}
  .list-badge{font-size:10px;padding:2px 8px;border-radius:10px}
  .edit-btn{background:none;border:1px solid var(--gold);color:var(--navy);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:Georgia,serif}
  .del-btn{background:none;border:1px solid #ffcccc;color:#C0392B;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:Georgia,serif}
  .loading{text-align:center;padding:60px;color:#888;font-style:italic}
  @media(max-width:500px){
    .form-grid{grid-template-columns:1fr}
    .form-field.full{grid-column:1}
    .cal-cell{min-height:55px}
    .cal-chip{font-size:8px}
  }
</style>

<body>
<div id="app"><div class="loading">Loading Testometer...</div></div>
<script>const ADMIN_PASSWORD = "ClassisInvicta2026";
const BIN_ID = "6a49668eda38895dfe2e91db";
const API_KEY = "$2a$10$YHcneh1IRo5hvS.CDWiNLuNwGGNPXVH8X8yPU7OaeACxbI5grYk7m";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

async function loadFromCloud(){
  try{
    const res = await fetch(BIN_URL+"/latest",{headers:{"X-Master-Key":API_KEY,"X-Bin-Meta":"false"}});
    const data = await res.json();
    if(data&&data.tests&&data.tests.length>0) return data.tests;
  }catch(e){}
  return null;
}

async function saveToCloud(tests){
  try{
    await fetch(BIN_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify({tests})});
  }catch(e){console.error("Save failed",e);}
}

const REAL_TESTS=[
  {id:1,course:"VMSR 402",title:"Principles of Surgery",date:"2026-07-03",time:"",venue:"",type:"Test"},
  {id:2,course:"VMPA 402",title:"Pathology of Infectious Diseases",date:"2026-07-07",time:"",venue:"",type:"Test"},
  {id:3,course:"VMPT 404",title:"Veterinary Toxicology",date:"2026-07-14",time:"",venue:"",type:"Test"},
  {id:4,course:"VMPA 402",title:"Chemotherapy",date:"2026-07-18",time:"",venue:"",type:"Test"},
  {id:5,course:"VMMB 404",title:"Virology",date:"2026-07-23",time:"",venue:"",type:"Test"},
  {id:6,course:"VMPA 402",title:"Pathology of Infectious Diseases",date:"2026-07-25",time:"",venue:"",type:"Test"},
  {id:7,course:"VMPT 402",title:"Chemotherapy",date:"2026-07-29",time:"",venue:"",type:"Test"},
  {id:8,course:"VMPA 408",title:"Laboratory Animal Diseases",date:"2026-07-31",time:"",venue:"",type:"Test"},
  {id:9,course:"VMPA 406",title:"Clinical Pathology",date:"2026-08-06",time:"",venue:"",type:"Test"},
  {id:10,course:"VMMB 404",title:"Virology",date:"2026-08-11",time:"",venue:"",type:"Test"},
  {id:11,course:"VMPT 404",title:"Veterinary Toxicology",date:"2026-08-19",time:"",venue:"",type:"Test"},
  {id:12,course:"VMSR 402",title:"Principles of Surgery",date:"2026-08-24",time:"",venue:"",type:"Test"},
];

const PUBLIC_HOLIDAYS=[
  {date:"2026-06-12",name:"Democracy Day"},
  {date:"2026-08-25",name:"Eid el-Mawlid"},
  {date:"2026-10-01",name:"Independence Day"},
];

const ACADEMIC_BLOCKS=[
  {from:"2026-06-01",to:"2026-07-25",label:"Lectures",type:"lecture"},
  {from:"2026-07-27",to:"2026-08-01",label:"Mid-Semester Break",type:"break"},
  {from:"2026-08-03",to:"2026-09-12",label:"Lectures",type:"lecture"},
  {from:"2026-09-14",to:"2026-10-03",label:"Final Examinations",type:"exams"},
];

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS_SHORT=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function dateInRange(d,f,t){return d>=f&&d<=t;}
function getBlockForDate(d){return ACADEMIC_BLOCKS.find(b=>dateInRange(d,b.from,b.to));}
function getHolidayForDate(d){return PUBLIC_HOLIDAYS.find(h=>h.date===d);}
function daysUntil(dateStr){
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(dateStr+"T00:00:00");
  const diff=Math.round((d-today)/86400000);
  if(diff<0)return{label:"Done",past:true,urgent:false};
  if(diff===0)return{label:"Today!",past:false,urgent:true};
  if(diff===1)return{label:"Tomorrow",past:false,urgent:true};
  if(diff<=3)return{label:diff+"d away",past:false,urgent:true};
  return{label:diff+"d away",past:false,urgent:false};
}
function formatDate(dateStr){
  const d=new Date(dateStr+"T00:00:00");
  return `${DAYS_SHORT[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
function isoDate(y,m,d){return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
function typeClass(t){return(t||"test").toLowerCase();}
function dotColor(t){return{Test:"#1B2A4A",Practical:"#C9A84C",Quiz:"#2E8B2E",Exam:"#C0392B"}[t]||"#888";}
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}

let state={
  tests:REAL_TESTS,view:"timeline",filter:"All",
  calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),
  adminOpen:false,authed:false,pwInput:"",pwError:false,
  saved:false,editId:null,form:{course:"",title:"",date:"",time:"",venue:"",type:"Test"},
};

function save(){saveToCloud(state.tests);}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const todayStr=new Date().toISOString().slice(0,10);
  const currentBlock=getBlockForDate(todayStr);
  const filtered=state.tests.filter(t=>state.filter==="All"||t.type===state.filter).sort((a,b)=>a.date.localeCompare(b.date));
  const upcoming=filtered.filter(t=>!daysUntil(t.date).past).slice(0,3);

  const topbar=el("div","topbar");
  const tl=el("div","topbar-left");
  tl.innerHTML=`<div class="topbar-eyebrow">Classis Invicta · 400 Level · FVM ABU Zaria</div><div class="topbar-title">The Testometer</div>`;
  const adminBtn=el("button","admin-btn");adminBtn.textContent="⚙ Admin";
  adminBtn.onclick=()=>{state.adminOpen=true;render();};
  topbar.appendChild(tl);topbar.appendChild(adminBtn);
  app.appendChild(topbar);

  if(currentBlock&&currentBlock.type!=="lecture"){
    const banner=el("div",currentBlock.type==="break"?"banner banner-break":"banner banner-exams");
    banner.textContent=currentBlock.type==="break"?"📌 Mid-Semester Break is currently ongoing":"📌 Final Examination Period is currently ongoing";
    app.appendChild(banner);
  }

  if(upcoming.length>0){
    const strip=el("div","nextup");
    const lbl=el("span","nextup-label");lbl.textContent="Next Up:";
    strip.appendChild(lbl);
    upcoming.forEach(t=>{
      const d=daysUntil(t.date);
      const chip=el("div","nextup-chip");
      chip.innerHTML=`<span class="nextup-dot" style="background:${d.urgent?"#C0392B":"#1B2A4A"}"></span><span class="nextup-course">${t.course}</span><span class="nextup-title">${t.title}</span><span class="nextup-days" style="color:${d.urgent?"#C0392B":"#888"};font-weight:${d.urgent?"bold":"normal"}">${d.label}</span>`;
      strip.appendChild(chip);
    });
    app.appendChild(strip);
  }

  const controls=el("div","controls");
  const vt=el("div","view-toggle");
  ["timeline","calendar"].forEach(v=>{
    const b=el("button","view-btn"+(state.view===v?" active":""));
    b.textContent=v==="timeline"?"📋 Timeline":"📅 Calendar";
    b.onclick=()=>{state.view=v;render();};
    vt.appendChild(b);
  });
  const fi=el("div","filters");
  ["All","Test","Practical","Quiz","Exam"].forEach(f=>{
    const b=el("button","filter-btn"+(state.filter===f?" active":""));
    b.textContent=f;b.onclick=()=>{state.filter=f;render();};
    fi.appendChild(b);
  });
  controls.appendChild(vt);controls.appendChild(fi);
  app.appendChild(controls);

  const main=el("div","main");

  if(state.view==="timeline"){
    const leg=el("div","legend");
    [{c:"#1B2A4A",l:"Test"},{c:"#C9A84C",l:"Practical"},{c:"#2E8B2E",l:"Quiz"},{c:"#C0392B",l:"Exam"},{c:"#ccc",l:"Holiday"}].forEach(({c,l})=>{
      const li=el("div","legend-item");
      li.innerHTML=`<span class="legend-dot" style="background:${c}"></span><span>${l}</span>`;
      leg.appendChild(li);
    });
    main.appendChild(leg);
    let lastMonth=null;
    filtered.forEach(t=>{
      const d=daysUntil(t.date);
      const dateObj=new Date(t.date+"T00:00:00");
      const monthKey=t.date.slice(0,7);
      const holiday=getHolidayForDate(t.date);
      const block=getBlockForDate(t.date);
      const inBreak=block&&block.type==="break";
      if(monthKey!==lastMonth){
        lastMonth=monthKey;
        const[yr,mo]=monthKey.split("-");
        const mh=el("div","month-header");
        mh.textContent=`${MONTHS[parseInt(mo)-1]} ${yr}`;
        main.appendChild(mh);
      }
      const row=el("div","timeline-row"+(d.past?" past":""));
      const dc=el("div","date-col");
      const isToday=t.date===todayStr;
      dc.innerHTML=`<div class="date-day${isToday?" today":""}">${dateObj.getDate()}</div><div class="date-dow">${DAYS_SHORT[dateObj.getDay()]}</div>`;
      row.appendChild(dc);
      const line=el("div","timeline-line"+(d.past?" past":""));
      row.appendChild(line);
      const card=el("div",`card card-left-border-${typeClass(t.type)}`);
      const top=el("div","card-top");
      const info=el("div","");
      info.innerHTML=`<div class="card-course">${t.course}${inBreak?" · <span style='color:#C0392B;font-size:9px'>MID-SEM BREAK PERIOD</span>":""}</div><div class="card-title">${t.title}</div>`;
      const badges=el("div","card-badges");
      badges.innerHTML=`<span class="badge badge-${typeClass(t.type)}">${t.type}</span>`;
      if(holiday)badges.innerHTML+=`<span class="badge" style="background:#f0f0f0;color:#666">🏛 ${holiday.name}</span>`;
      if(d.past)badges.innerHTML+=`<span class="badge badge-done">Done</span>`;
      else if(d.urgent)badges.innerHTML+=`<span class="badge-soon">${d.label}</span>`;
      else badges.innerHTML+=`<span class="badge-away">${d.label}</span>`;
      top.appendChild(info);top.appendChild(badges);
      card.appendChild(top);
      if(t.time||t.venue){
        const meta=el("div","card-meta");
        if(t.time)meta.innerHTML+=`<span>🕐 ${t.time}</span>`;
        if(t.venue)meta.innerHTML+=`<span>📍 ${t.venue}</span>`;
        card.appendChild(meta);
      }
      row.appendChild(card);
      main.appendChild(row);
    });
    if(filtered.length===0){
      const empty=el("div","");
      empty.style.cssText="text-align:center;color:#aaa;padding:60px;font-style:italic";
      empty.textContent="No tests match this filter.";
      main.appendChild(empty);
    }
  }

  if(state.view==="calendar"){
    const nav=el("div","cal-nav");
    const prevBtn=el("button","cal-nav-btn");prevBtn.textContent="‹";
    prevBtn.onclick=()=>{let m=state.calMonth-1,y=state.calYear;if(m<0){m=11;y--;}state.calMonth=m;state.calYear=y;render();};
    const nextBtn=el("button","cal-nav-btn");nextBtn.textContent="›";
    nextBtn.onclick=()=>{let m=state.calMonth+1,y=state.calYear;if(m>11){m=0;y++;}state.calMonth=m;state.calYear=y;render();};
    const title=el("div","cal-month-title");
    title.textContent=`${MONTHS[state.calMonth]} ${state.calYear}`;
    nav.appendChild(prevBtn);nav.appendChild(title);nav.appendChild(nextBtn);
    main.appendChild(nav);
    const leg=el("div","legend");
    [{c:"#1B2A4A",l:"Test"},{c:"#C9A84C",l:"Practical"},{c:"#2E8B2E",l:"Quiz"},{c:"#C0392B",l:"Exam"},{c:"#ccc",l:"Holiday"},{c:"#f0c060",l:"Break"}].forEach(({c,l})=>{
      const li=el("div","legend-item");
      li.innerHTML=`<span class="legend-dot" style="background:${c}"></span><span>${l}</span>`;
      leg.appendChild(li);
    });
    main.appendChild(leg);
    const gh=el("div","cal-grid-header");
    DAYS_SHORT.forEach(d=>{const dh=el("div","cal-dow");dh.textContent=d;gh.appendChild(dh);});
    main.appendChild(gh);
    const firstDay=new Date(state.calYear,state.calMonth,1).getDay();
    const totalDays=new Date(state.calYear,state.calMonth+1,0).getDate();
    const grid=el("div","cal-grid");
    for(let i=0;i<firstDay;i++)grid.appendChild(el("div","cal-cell empty"));
    for(let d=1;d<=totalDays;d++){
      const ds=isoDate(state.calYear,state.calMonth,d);
      const holiday=getHolidayForDate(ds);
      const block=getBlockForDate(ds);
      const isBreak=block&&block.type==="break";
      const isToday=ds===todayStr;
      let cellClass="cal-cell";
      if(isBreak)cellClass+=" break-day";
      if(holiday)cellClass+=" holiday-day";
      if(isToday)cellClass+=" today";
      const cell=el("div",cellClass);
      const dateNum=el("div","cal-date"+(isToday?" today-num":""));
      dateNum.textContent=d;cell.appendChild(dateNum);
      if(holiday){const chip=el("div","cal-chip cal-chip-holiday");chip.title=holiday.name;chip.textContent=holiday.name;cell.appendChild(chip);}
      state.tests.filter(t=>t.date===ds).forEach(t=>{
        const chip=el("div",`cal-chip cal-chip-${typeClass(t.type)}`);
        chip.title=`${t.course} — ${t.title}${t.time?" | "+t.time:""}${t.venue?" | "+t.venue:""}`;
        chip.textContent=t.course;cell.appendChild(chip);
      });
      grid.appendChild(cell);
    }
    main.appendChild(grid);
    const key=el("div","");
    key.style.cssText="margin-top:16px;font-size:11px;color:#888;font-style:italic;line-height:1.8";
    key.innerHTML=`<strong style="color:var(--navy);font-style:normal">Academic Calendar (2nd Semester):</strong><br>Lectures: 1 Jun – 25 Jul 2026 · Mid-Semester Break: 27 Jul – 1 Aug 2026<br>Lectures Resume: 3 Aug – 12 Sep 2026 · Final Examinations: 14 Sep – 3 Oct 2026`;
    main.appendChild(key);
  }

  app.appendChild(main);if(state.adminOpen){
    const overlay=el("div","modal-overlay");
    overlay.onclick=e=>{if(e.target===overlay){state.adminOpen=false;state.authed=false;state.pwInput="";render();}};
    const modal=el("div","modal");
    const mh=el("div","modal-header");
    const mht=el("div","modal-header-text");
    mht.innerHTML=`<div class="eyebrow">Academic Committee · Admin</div><div class="title">Testometer Admin Panel</div>`;
    const mc=el("button","modal-close");mc.textContent="✕";
    mc.onclick=()=>{state.adminOpen=false;state.authed=false;state.pwInput="";render();};
    mh.appendChild(mht);mh.appendChild(mc);
    modal.appendChild(mh);
    const mb=el("div","modal-body");
    if(!state.authed){
      const ls=el("div","lock-screen");
      ls.innerHTML=`<div class="lock-icon">🔒</div><div class="lock-title">Committee Access Only</div><div class="lock-sub">Enter the admin password to manage the testometer.</div>`;
      const pw=el("input","pw-input"+(state.pwError?" error":""));
      pw.type="password";pw.placeholder="Password";pw.value=state.pwInput;
      pw.oninput=e=>{state.pwInput=e.target.value;};
      pw.onkeydown=e=>{if(e.key==="Enter")tryAuth();};
      if(state.pwError){const err=el("div","pw-error");err.textContent="Incorrect password.";ls.appendChild(pw);ls.appendChild(err);}
      else ls.appendChild(pw);
      const ub=el("button","unlock-btn");ub.textContent="Unlock";ub.onclick=tryAuth;
      ls.appendChild(ub);
      mb.appendChild(ls);
    }else{
      if(state.saved){const sb=el("div","success-bar");sb.textContent="✓ Saved to cloud successfully";mb.appendChild(sb);}
      const fb=el("div","form-box");
      const ft=el("div","form-title");ft.textContent=state.editId?"✏ Edit Test":"＋ Add New Test";
      fb.appendChild(ft);
      const fg=el("div","form-grid");
      [["course","Course Code","e.g. VMPA 402",false],["title","Test Title","e.g. Virology",true],["date","Date","",false],["time","Time (optional)","",false],["venue","Venue (optional)","e.g. LT1",false]].forEach(([k,lbl,ph,full])=>{
        const ff=el("div","form-field"+(full?" full":""));
        const fl=el("label","form-label");fl.textContent=lbl;
        const fi2=el("input","form-input");
        fi2.type=k==="date"?"date":k==="time"?"time":"text";
        fi2.placeholder=ph;fi2.value=state.form[k]||"";
        fi2.oninput=e=>{state.form[k]=e.target.value;};
        ff.appendChild(fl);ff.appendChild(fi2);fg.appendChild(ff);
      });
      const tf=el("div","form-field");
      const tl2=el("label","form-label");tl2.textContent="Type";
      const ts=el("select","form-input");
      ["Test","Practical","Quiz","Exam"].forEach(t=>{
        const o=document.createElement("option");o.value=t;o.textContent=t;
        if(state.form.type===t)o.selected=true;
        ts.appendChild(o);
      });
      ts.onchange=e=>{state.form.type=e.target.value;};
      tf.appendChild(tl2);tf.appendChild(ts);fg.appendChild(tf);
      fb.appendChild(fg);
      const fa=el("div","form-actions");
      const svb=el("button","save-btn");svb.textContent=state.editId?"Update":"Add Test";
      svb.onclick=handleSave;fa.appendChild(svb);
      if(state.editId){
        const cb=el("button","cancel-btn");cb.textContent="Cancel";
        cb.onclick=()=>{state.editId=null;state.form={course:"",title:"",date:"",time:"",venue:"",type:"Test"};render();};
        fa.appendChild(cb);
      }
      fb.appendChild(fa);mb.appendChild(fb);
      const listTitle=el("div","list-title");
      listTitle.textContent=`All Tests (${state.tests.length})`;
      mb.appendChild(listTitle);
      [...state.tests].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
        const li=el("div","list-item"+(state.editId===t.id?" editing":""));
        const dot=el("span","list-dot");dot.style.background=dotColor(t.type);
        const info=el("div","list-info");
        info.innerHTML=`<div class="list-course">${t.course} — ${t.title}</div><div class="list-meta">${formatDate(t.date)}${t.time?" · "+t.time:""}${t.venue?" · "+t.venue:""}</div>`;
        const badge=el("span","list-badge");badge.textContent=t.type;
        badge.style.cssText=`background:${t.type==="Test"?"#E8EEF7":t.type==="Practical"?"#FEF3E2":t.type==="Quiz"?"#EBF5EB":"#F7E8E8"};color:${dotColor(t.type)}`;
        const eb=el("button","edit-btn");eb.textContent="Edit";
        eb.onclick=()=>{state.editId=t.id;state.form={course:t.course,title:t.title,date:t.date,time:t.time,venue:t.venue,type:t.type};render();};
        const db=el("button","del-btn");db.textContent="Delete";
        db.onclick=()=>{if(confirm("Delete this test?")){state.tests=state.tests.filter(x=>x.id!==t.id);save();render();}};
        li.appendChild(dot);li.appendChild(info);li.appendChild(badge);li.appendChild(eb);li.appendChild(db);
        mb.appendChild(li);
      });
    }
    modal.appendChild(mb);overlay.appendChild(modal);app.appendChild(overlay);
  }
}

function tryAuth(){
  if(state.pwInput===ADMIN_PASSWORD){state.authed=true;state.pwError=false;}
  else{state.pwError=true;}
  render();
}

function handleSave(){
  if(!state.form.course||!state.form.title||!state.form.date)return;
  if(state.editId!==null){
    state.tests=state.tests.map(t=>t.id===state.editId?{...state.form,id:state.editId}:t);
    state.editId=null;
  }else{
    state.tests=[...state.tests,{...state.form,id:Date.now()}];
  }
  state.tests.sort((a,b)=>a.date.localeCompare(b.date));
  state.form={course:"",title:"",date:"",time:"",venue:"",type:"Test"};
  save();
  state.saved=true;
  render();
  setTimeout(()=>{state.saved=false;render();},2500);
}

(async()=>{
  const cloud=await loadFromCloud();
  if(cloud)state.tests=cloud;
  render();
})();
</script>
</body>
</html>
